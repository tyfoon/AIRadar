# ──────────────────────────────────────────────────────────────
# AI-Radar — Docker Compose (Production)
# Deploys on a headless Ubuntu mini-PC acting as L2 bridge.
# All services use host networking to see real client IPs.
#
# Configuration: copy .env.example → .env and adjust values.
# ──────────────────────────────────────────────────────────────

services:
  # ── AI-Radar Application ──────────────────────────────────
  # FastAPI backend + static frontend + Zeek log tailer
  airadar-app:
    build: .
    container_name: airadar-app
    network_mode: "host"
    restart: unless-stopped
    env_file: .env
    environment:
      # Container-internal overrides (paths inside the container)
      - AIRADAR_DB_PATH=/app/data/airadar.db
      - ZEEK_LOG_DIR=/app/logs
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent database — survives container restarts
      - ./data:/app/data
      # Read-only access to Zeek logs on the host
      - ${ZEEK_LOG_DIR:-/opt/zeek/logs/current}:/app/logs:ro
    depends_on:
      adguardhome:
        condition: service_healthy
      crowdsec:
        condition: service_started

  # ── AdGuard Home — DNS-level ad/tracker blocking ──────────
  # Web UI: http://<bridge-ip>:3000 (first run) → :80 (after setup)
  # DNS:    <bridge-ip>:53
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - ./adguard/conf:/opt/adguardhome/conf
      - ./adguard/work:/opt/adguardhome/work
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── CrowdSec — Intrusion Prevention (IPS) ─────────────────
  # LAPI: http://localhost:8080
  # Parses Zeek logs for threat intelligence
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    network_mode: "host"
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/zeek
    volumes:
      - ./crowdsec/conf:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      # Same Zeek logs as our app — CrowdSec parses them for threats
      - ${ZEEK_LOG_DIR:-/opt/zeek/logs/current}:/var/log/zeek:ro
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
