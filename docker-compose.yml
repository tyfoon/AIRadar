# ──────────────────────────────────────────────────────────────
# AI-Radar — Docker Compose (Production)
# Deploys on a headless Ubuntu mini-PC acting as L2 bridge.
# All services use host networking to see real client IPs.
#
# Configuration: copy .env.example → .env and adjust values.
# ──────────────────────────────────────────────────────────────

services:
  # ── AI-Radar Application ──────────────────────────────────
  # FastAPI backend + static frontend + Zeek log tailer
  airadar-app:
    build: .
    container_name: airadar-app
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - NET_RAW      # Required for p0f passive packet capture
      - NET_ADMIN    # Required for ARP/NDP lookups
    env_file: .env
    environment:
      # Container-internal overrides (paths inside the container)
      - AIRADAR_DB_PATH=/app/data/airadar.db
      - ZEEK_LOG_DIR=/app/logs
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent database — survives container restarts
      - ./data:/app/data
      # Static frontend files — bind-mounted so changes in static/
      # (React bundles, mockups, index.html, sw.js, style.css) pick
      # up after a `git pull` without needing a full image rebuild.
      # Read-only: the container never writes here.
      - ./static:/app/static:ro
      # Read-only access to Zeek logs on the host
      # Mount spool/zeek directly — /opt/zeek/logs/current is a symlink
      # that Docker bind mounts don't follow reliably.
      - ${ZEEK_LOG_DIR:-/opt/zeek/spool/zeek}:/app/logs:ro
      # Read-only docker socket — used for per-container performance stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      adguardhome:
        condition: service_healthy
      crowdsec:
        condition: service_started

  # ── AdGuard Home — DNS-level ad/tracker blocking ──────────
  # Web UI: http://<bridge-ip>:3000 (first run) → :80 (after setup)
  # DNS:    <bridge-ip>:53
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - ./adguard/conf:/opt/adguardhome/conf
      - ./adguard/work:/opt/adguardhome/work
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ── CrowdSec — Intrusion Prevention (IPS) ─────────────────
  # LAPI: http://localhost:8080
  # Parses Zeek logs for threat intelligence
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    network_mode: "host"
    restart: unless-stopped
    environment:
      # Collections define which log parsers + attack scenarios CrowdSec
      # runs. Each one adds detection capability for a specific vector:
      #   linux           — SSH brute force, syslog anomalies
      #   zeek-logs       — port scanning, connection floods from Zeek conn.log
      #   iptables        — multi-port scan detection from kernel logs
      #   base-http-scenarios — HTTP probing, bad user-agents, aggressive crawls
      #   http-cve        — known CVE exploit attempts in HTTP
      #   whitelist-good-actors — prevents false positives on search engine bots
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/iptables crowdsecurity/base-http-scenarios crowdsecurity/http-cve crowdsecurity/whitelist-good-actors
    volumes:
      - ./crowdsec/conf:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      # Same Zeek logs as our app — CrowdSec parses them for threats
      - ${ZEEK_LOG_DIR:-/opt/zeek/spool/zeek}:/var/log/zeek:ro
      # Host system logs for SSH brute force & syslog detection
      - /var/log:/var/log/host:ro
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Cloudflare Tunnel — remote access to the dashboard ───
  # Exposes airadar-app (host:8000) to the internet via a
  # Cloudflare Tunnel so there's no need to open any port on
  # the router. The tunnel is remotely managed: all routing
  # (public hostname → localhost:8000) lives in the Cloudflare
  # dashboard, this container only runs the connector.
  #
  # Host networking is deliberate — it lets cloudflared reach
  # the airadar-app on localhost:8000 without having to poke
  # holes across a bridge network. It also matches the rest of
  # the stack so there's only one networking model to reason
  # about.
  #
  # CLOUDFLARE_TUNNEL_TOKEN lives in .env (never committed);
  # see .env.example for how to create one.
  #
  # ⚠️ Put the public hostname behind Cloudflare Access before
  # enabling this — AIRadar has no built-in login.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    network_mode: "host"
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_METRICS=127.0.0.1:2000
    depends_on:
      - airadar-app
